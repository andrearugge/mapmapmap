services:
  db:
    image: postgres:16
    container_name: mapmapmap-db
    environment:
      POSTGRES_USER: mapmapmap
      POSTGRES_PASSWORD: mapmapmap
      POSTGRES_DB: mapmapmap
    ports:
      - "5433:5432"
    volumes:
      - mapmapmap-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapmapmap"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - migrate_modules:/app/node_modules
    environment:
      DATABASE_URL: postgres://mapmapmap:mapmapmap@db:5432/mapmapmap
      CI: "true"
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm db:migrate"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  mapmapmap-pgdata:
    external: true
    name: mapmapmap-pgdata
  migrate_modules:
